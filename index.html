<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UAFT • KUTO Mobile v3</title>
  <style>
    :root{
      --bg:#0b0c11;
      --panel:#141720;
      --panel2:#171b26;
      --line:#262b38;
      --text:#edf0f7;
      --muted:#9da4b8;
      --blue:#427bff;
      --green:#34c56e;
      --yellow:#f0d271;
      --red:#ff6060;
      --orange:#f39c12;
      --violet:#a980ff;
      --chip:#1d2330;
      --shadow:0 10px 26px rgba(0,0,0,.34);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{overflow:hidden}
    button,input,select{font:inherit}
    .app{height:100dvh;display:flex;flex-direction:column;background:radial-gradient(circle at top center, rgba(66,123,255,.08), transparent 30%), var(--bg)}
    .topbar{position:sticky;top:0;z-index:20;padding:16px 16px 12px;border-bottom:1px solid var(--line);backdrop-filter:blur(12px);background:rgba(11,12,17,.92)}
    .title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    h1{margin:0;font-size:28px;line-height:1.05;letter-spacing:.2px}
    .sub{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.35}
    .badges{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
    .badge{border:1px solid var(--line);background:rgba(255,255,255,.02);padding:9px 12px;border-radius:999px;color:var(--muted);font-weight:700;white-space:nowrap;font-size:13px}
    .badge.lock{cursor:pointer}
    .badge.lock.unlocked{background:rgba(66,123,255,.16);border-color:rgba(66,123,255,.36);color:#d7e2ff}

    .content{flex:1;overflow:auto;padding:14px 14px 104px}
    .view{display:none;flex-direction:column;gap:12px}
    .view.active{display:flex}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.02), transparent 100%), var(--panel);border:1px solid var(--line);border-radius:22px;padding:14px;box-shadow:var(--shadow)}
    .section-title{font-size:17px;font-weight:800;margin:0 0 4px}
    .section-sub{font-size:14px;color:var(--muted);margin:0 0 10px;line-height:1.35}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

    .btn{appearance:none;border:1px solid var(--line);background:var(--chip);color:var(--text);border-radius:16px;padding:12px 12px;font-weight:800;line-height:1.1;cursor:pointer}
    .btn.small{padding:10px 11px;font-size:14px;border-radius:14px}
    .btn.blue{background:var(--blue);border-color:#2d63dc}
    .btn.green{background:var(--green);border-color:#24a758;color:#07110a}
    .btn.warn{background:#302816;border-color:#5e4d1f;color:#f7dda0}
    .btn.danger{background:#331b1b;border-color:#6b2a2a;color:#ffb2b2}
    .btn.ghost{background:transparent}
    .btn[disabled]{opacity:.45;cursor:default}
    .btn:active{transform:translateY(1px)}

    .context-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label.field{display:flex;flex-direction:column;gap:7px;min-width:0}
    label.field span{color:var(--muted);font-size:13px}
    input,select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:16px;padding:13px 14px;outline:none}
    input::placeholder{color:#6f7890}

    .student-list{display:flex;flex-direction:column;gap:10px}
    .student-card{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:12px;display:flex;flex-direction:column;gap:10px;cursor:pointer}
    .student-card.selected{border-color:#3d6cff;box-shadow:0 0 0 2px rgba(61,108,255,.18) inset}
    .student-head{display:grid;grid-template-columns:54px 1fr auto;gap:10px;align-items:start}
    .avatar{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;font-size:18px;font-weight:900;background:linear-gradient(135deg,#4f74ff,#1a1e2a);border:2px solid rgba(255,255,255,.08)}
    .main{min-width:0;display:flex;flex-direction:column;gap:8px}
    .fio{font-size:18px;font-weight:800;line-height:1.05;word-break:break-word}
    .meta{display:flex;flex-wrap:wrap;gap:8px}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:8px 11px;border-radius:999px;border:1px solid var(--line);background:var(--chip);font-size:13px;font-weight:700}
    .chip.ok{background:rgba(52,197,110,.16);border-color:rgba(52,197,110,.34);color:#92f1b3}
    .chip.frozen{background:rgba(66,123,255,.16);border-color:rgba(66,123,255,.34);color:#b8cfff}
    .chip.debt{background:rgba(255,96,96,.16);border-color:rgba(255,96,96,.34);color:#ffc1c1}
    .side-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
    .icon-btn{width:38px;height:38px;border-radius:13px;border:1px solid var(--line);background:#171b26;color:#d9dfef;display:grid;place-items:center;cursor:pointer}
    .icon-btn.danger{color:#ffb6b6;background:rgba(255,96,96,.1);border-color:rgba(255,96,96,.28)}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .kpi{background:#121621;border:1px solid var(--line);border-radius:16px;padding:10px 10px 9px}
    .kpi .label{color:var(--muted);font-size:12px;margin-bottom:5px}
    .kpi .value{font-size:16px;font-weight:900;line-height:1.05}
    .subline{font-size:13px;color:var(--muted);line-height:1.3}
    .card-footer{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .linkish{font-size:14px;color:#dfe7ff;font-weight:800}

    .hero{display:flex;flex-direction:column;gap:12px}
    .hero-top{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:start}
    .hero-avatar{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;font-size:22px;font-weight:900;background:linear-gradient(135deg,#4f74ff,#1a1e2a);border:2px solid rgba(255,255,255,.08)}
    .hero h2{font-size:24px;line-height:1.05;margin:0;word-break:break-word}
    .facts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .fact{background:#121621;border:1px solid var(--line);border-radius:16px;padding:10px}
    .fact .label{color:var(--muted);font-size:12px;margin-bottom:4px}
    .fact .value{font-size:15px;font-weight:800;line-height:1.12}

    .progress-top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
    .lock-chip{display:inline-flex;align-items:center;gap:8px;padding:10px 13px;border-radius:999px;border:1px solid var(--line);background:var(--chip);font-weight:800;cursor:pointer;white-space:nowrap;font-size:14px}
    .lock-chip.unlocked{background:rgba(66,123,255,.18);border-color:rgba(66,123,255,.38);color:#cfe0ff}
    .month-strip{overflow:auto;margin:0 -3px;padding:3px}
    .days{display:flex;gap:10px;min-width:max-content}
    .day-card{width:132px;background:#121621;border:1px solid var(--line);border-radius:20px;padding:12px;display:flex;flex-direction:column;gap:10px}
    .day-head{text-align:center}
    .day-date{font-size:18px;font-weight:900;line-height:1.05}
    .day-dow{font-size:13px;color:var(--muted);margin-top:4px}
    .slot{position:relative;min-height:88px;border-radius:18px;border:1px solid var(--line);background:#171b26;padding:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;cursor:pointer;user-select:none}
    .slot.empty{color:#7f8798}
    .slot.block{background:rgba(66,123,255,.12);border-color:rgba(66,123,255,.26)}
    .slot.trial{background:rgba(240,210,113,.14);border-color:rgba(240,210,113,.32);color:#ffe9a6}
    .slot.single{background:rgba(243,156,18,.14);border-color:rgba(243,156,18,.32);color:#ffd6a0}
    .slot.bonus{background:rgba(169,128,255,.14);border-color:rgba(169,128,255,.32);color:#dec8ff}
    .slot .mainMark{font-size:20px;font-weight:900;line-height:1}
    .slot .slotSub{font-size:12px;opacity:.9;line-height:1.2}
    .slot .payMark{position:absolute;right:8px;top:8px;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:rgba(52,197,110,.16);border:1px solid rgba(52,197,110,.36);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#a8f4c1}
    .time-meta{display:grid;grid-template-columns:1fr;gap:5px;margin-top:2px}
    .time-meta div{font-size:11px;color:var(--muted);text-align:center;line-height:1.2}
    .legend{display:flex;flex-wrap:wrap;gap:8px}
    .hint{color:var(--muted);font-size:13px;line-height:1.4}

    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:10px 14px calc(10px + var(--safe-bottom));background:linear-gradient(180deg, rgba(11,12,17,0), rgba(11,12,17,.96) 30%, rgba(11,12,17,.98));backdrop-filter:blur(12px)}
    .bottom-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .nav-btn{padding:13px 10px;border-radius:16px;border:1px solid var(--line);background:rgba(20,23,32,.96);color:var(--text);font-size:14px;font-weight:900;cursor:pointer}
    .nav-btn.active{border-color:#396bfa;background:#1b2540;color:#dfe7ff}

    .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.52);backdrop-filter:blur(4px);display:none;z-index:50}
    .sheet-backdrop.show{display:block}
    .sheet{position:absolute;left:0;right:0;bottom:0;background:#11151f;border-top-left-radius:24px;border-top-right-radius:24px;border:1px solid var(--line);padding:14px 14px calc(14px + var(--safe-bottom));box-shadow:0 -18px 36px rgba(0,0,0,.44);max-height:min(84dvh,760px);overflow:auto}
    .sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    .sheet-title{font-size:20px;font-weight:900;line-height:1.06}
    .sheet-sub{color:var(--muted);font-size:13px;line-height:1.35;margin-top:4px}
    .close{background:transparent;border:0;color:#aeb6ca;font-size:28px;line-height:1;cursor:pointer}
    .sheet-group{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .segment{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .segment button.active{border-color:#396bfa;background:#1b2540;color:#dfe7ff}
    .list-choices{display:flex;flex-direction:column;gap:8px}
    .choice{background:#121621;border:1px solid var(--line);border-radius:16px;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .choice .name{font-weight:800;line-height:1.12}
    .choice .meta{font-size:12px;color:var(--muted)}

    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:92px;z-index:60;background:#12161f;border:1px solid var(--line);color:var(--text);padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .18s ease, transform .18s ease;max-width:calc(100vw - 32px);text-align:center}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

    @media (min-width:720px){
      .content{max-width:760px;margin:0 auto;padding-left:18px;padding-right:18px}
      .bottom-nav{display:flex;justify-content:center}
      .bottom-row{max-width:760px;width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-row">
        <div>
          <h1>KUTO</h1>
          <div class="sub" id="headerSub"></div>
        </div>
        <div class="badges">
          <div class="badge" id="activeBadge"></div>
          <div class="badge lock" id="globalLockBadge"></div>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="view active" id="view-list"></section>
      <section class="view" id="view-student"></section>
      <section class="view" id="view-progress"></section>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-row">
        <button class="nav-btn active" data-view="list">Состав</button>
        <button class="nav-btn" data-view="student">Ученик</button>
        <button class="nav-btn" data-view="progress">Прогресс</button>
      </div>
    </nav>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>

<script>
(() => {
  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const WEEK = ['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];

  const app = {
    view: 'list',
    discipline: 'Кикбоксинг',
    trainingType: 'Групповая',
    group: 'Группа A',
    month: 8,
    year: 2025,
    query: '',
    selectedStudentId: 'u2',
    editUnlocked: false,
    store: new Map(),
    studentPool: [
      {id:'sp1', fullName:'Смирнов Егор', packageLabel:'Блок 8', packageNumber:7, packageTotal:8, startDate:'2025-07-05', activeUntil:'2025-08-02', price:3000, paid:3000, discount:0},
      {id:'sp2', fullName:'Зайцева Полина', packageLabel:'Блок 4', packageNumber:3, packageTotal:4, startDate:'2025-08-09', activeUntil:'2025-09-06', price:2000, paid:1500, discount:0},
      {id:'sp3', fullName:'Кузнецов Максим', packageLabel:'Пробная', packageNumber:1, packageTotal:1, startDate:'2025-09-05', activeUntil:'2025-09-05', price:0, paid:0, discount:0}
    ],
    groupPool: [
      {id:'gp1', fullName:'Лазарев Никита', packageLabel:'Блок 12', packageNumber:4, packageTotal:12, startDate:'2025-06-01', activeUntil:'2025-06-29', price:4000, paid:4000, discount:0},
      {id:'gp2', fullName:'Тарасова Вера', packageLabel:'Блок 8', packageNumber:5, packageTotal:8, startDate:'2025-07-14', activeUntil:'2025-08-11', price:3000, paid:3000, discount:0}
    ]
  };

  const els = {
    list: document.getElementById('view-list'),
    student: document.getElementById('view-student'),
    progress: document.getElementById('view-progress'),
    headerSub: document.getElementById('headerSub'),
    activeBadge: document.getElementById('activeBadge'),
    globalLockBadge: document.getElementById('globalLockBadge'),
    sheetBackdrop: document.getElementById('sheetBackdrop'),
    sheet: document.getElementById('sheet'),
    toast: document.getElementById('toast')
  };

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function monthKey(){ return `${app.year}-${String(app.month+1).padStart(2,'0')}`; }
  function fullContext(){ return `${app.discipline} • ${app.trainingType} • ${app.group} • ${MONTHS[app.month]} ${app.year}`; }
  function initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(s => (s[0] || '').toUpperCase()).join(''); }
  function nextMonth(y,m){ return m === 11 ? {year:y+1, month:0} : {year:y, month:m+1}; }
  function clone(v){ return JSON.parse(JSON.stringify(v)); }
  function esc(s){ return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function formatDate(iso){
    if(!iso) return '—';
    const [y,m,d] = String(iso).split('-');
    if(!y || !m || !d) return iso;
    return `${d}.${m}.${y}`;
  }
  function addDays(iso, days){
    const dt = new Date(iso + 'T00:00:00');
    dt.setDate(dt.getDate() + days);
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }
  function money(v){ return String(v || 0); }
  function requireUnlocked(msg='Сначала откройте замок'){ if(app.editUnlocked) return true; showToast(msg); return false; }

  function createStudent(data){
    const s = {
      id: data.id || uid(),
      fullName: data.fullName || 'Новый ученик',
      packageType: data.packageType || 'block',
      packageLabel: data.packageLabel || 'Блок 8',
      packageFront: data.packageFront || (data.packageLabel || 'Блок 8'),
      packageNumber: Number(data.packageNumber || 1),
      packageTotal: Number(data.packageTotal || 8),
      startDate: data.startDate || `${app.year}-${String(app.month+1).padStart(2,'0')}-01`,
      activeUntil: data.activeUntil || `${app.year}-${String(app.month+1).padStart(2,'0')}-28`,
      price: Number(data.price || 0),
      paid: Number(data.paid || 0),
      discount: Number(data.discount || 0),
      active: data.active !== false,
      frozen: !!data.frozen,
      freezeDays: Number(data.freezeDays || 0),
      extendDays: Number(data.extendDays || 0),
      progressSlots: data.progressSlots || {},
      monthlyMembership: data.monthlyMembership || monthKey(),
    };
    refreshStudentDerived(s);
    return s;
  }

  function createSeedState(){
    return {
      students: [
        createStudent({id:'u1', fullName:'Иванов Иван', packageLabel:'Блок 8', packageTotal:8, packageNumber:4, startDate:'2025-09-02', activeUntil:'2025-09-30', price:3000, paid:3000, progressSlots:{'1':{kind:'block', paymentAmount:0},'4':{kind:'block', paymentAmount:0}}}),
        createStudent({id:'u2', fullName:'Фролова Анна', packageLabel:'Блок 12', packageTotal:12, packageNumber:9, startDate:'2025-09-01', activeUntil:'2025-09-29', price:4000, paid:2500, progressSlots:{'0':{kind:'block'},'2':{kind:'block'},'6':{kind:'single', paymentAmount:600},'8':{kind:'bonus'}}}),
        createStudent({id:'u3', fullName:'Петров Пётр', packageLabel:'Пробная', packageType:'trial', packageTotal:1, packageNumber:1, startDate:'2025-09-03', activeUntil:'2025-09-03', price:0, paid:0, progressSlots:{'2':{kind:'trial'}}}),
        createStudent({id:'u4', fullName:'Ксенофонтов Андрей', packageLabel:'Блок 4', packageTotal:4, packageNumber:12, startDate:'2025-09-04', activeUntil:'2025-10-02', price:2000, paid:1000, progressSlots:{'0':{kind:'block'},'3':{kind:'block'}}, frozen:true}),
      ]
    };
  }

  function monthState(){
    const key = monthKey();
    if(!app.store.has(key)) app.store.set(key, createSeedState());
    return app.store.get(key);
  }
  function students(){ return monthState().students; }
  function activeStudents(){ return students().filter(s => s.active); }
  function getStudent(id){ return students().find(s => s.id === id) || null; }
  function ensureSelected(){
    const current = getStudent(app.selectedStudentId);
    if(current && current.active) return current;
    const first = activeStudents()[0] || students()[0] || null;
    app.selectedStudentId = first ? first.id : null;
    return first;
  }
  function currentStudent(){ return ensureSelected(); }

  function blockCount(student){
    return Object.values(student.progressSlots || {}).filter(v => v && v.kind === 'block').length;
  }
  function kindCount(student, kind){
    return Object.values(student.progressSlots || {}).filter(v => v && v.kind === kind).length;
  }
  function progressText(student){
    if(student.packageType === 'trial') return kindCount(student,'trial') ? 'P' : '0';
    if(student.packageType === 'single') return `${kindCount(student,'single')}`;
    if(student.packageType === 'bonus') return `БОН ${kindCount(student,'bonus')}`;
    return `${blockCount(student)}/${student.packageTotal}`;
  }
  function computeStreakTrainings(student){
    const sorted = Object.keys(student.progressSlots || {}).map(n => Number(n)).sort((a,b) => a-b);
    let streak = 0;
    let prev = null;
    for(const idx of sorted){
      if(prev === null || idx === prev + 1) streak += 1; else streak = 1;
      prev = idx;
    }
    return streak;
  }
  function computeStreakDays(student){
    return Math.min(computeStreakTrainings(student), 7);
  }
  function refreshStudentDerived(student){
    student.debt = Math.max(0, Number(student.price || 0) - Number(student.discount || 0) - Number(student.paid || 0));
    student.streakDays = computeStreakDays(student);
    student.streakTrainings = computeStreakTrainings(student);
  }
  function statusChip(student){
    refreshStudentDerived(student);
    if(student.frozen) return {text:'Заморожен', cls:'frozen'};
    if(student.debt > 0) return {text:'Долг', cls:'debt'};
    return {text:'Активен', cls:'ok'};
  }

  function datesMWF(y,m,count=10){
    const d = new Date(y,m,1);
    while(d.getDay() !== 1){ d.setDate(d.getDate()+1); }
    const out = [];
    while(out.length < count){
      if([1,3,5].includes(d.getDay())) out.push(new Date(d));
      d.setDate(d.getDate()+1);
    }
    return out;
  }
  function getSlot(student, idx){ return student.progressSlots[idx] ? clone(student.progressSlots[idx]) : {kind:'empty', paymentAmount:0, arrival:'', start:'18:30'}; }
  function setSlot(student, idx, slot){ if(!student.progressSlots) student.progressSlots = {}; if(!slot || slot.kind === 'empty') delete student.progressSlots[idx]; else student.progressSlots[idx] = slot; refreshStudentDerived(student); }
  function ordinalForKind(student, idx, kind){
    return Object.keys(student.progressSlots || {}).map(n => Number(n)).sort((a,b)=>a-b).filter(i => i <= idx && student.progressSlots[i] && student.progressSlots[i].kind === kind).length;
  }
  function slotVisual(student, idx){
    const slot = getSlot(student, idx);
    if(!slot || slot.kind === 'empty') return {cls:'empty', main:'+', sub:'добавить факт', pay:''};
    if(slot.kind === 'block') return {cls:'block', main:`${ordinalForKind(student, idx, 'block')}/${student.packageTotal}`, sub:'из пакета', pay:slot.paymentAmount ? '₽' : ''};
    if(slot.kind === 'trial') return {cls:'trial', main:'P', sub:'пробная', pay:slot.paymentAmount ? '₽' : ''};
    if(slot.kind === 'single') return {cls:'single', main:`${ordinalForKind(student, idx, 'single')}`, sub:'разовая', pay:slot.paymentAmount ? '₽' : ''};
    if(slot.kind === 'bonus') return {cls:'bonus', main:`БОН ${ordinalForKind(student, idx, 'bonus')}`, sub:'бонус', pay:slot.paymentAmount ? '₽' : ''};
    return {cls:'empty', main:'+', sub:'добавить факт', pay:''};
  }

  function bindStudent(){
    const student = currentStudent();
    if(!student) return;
    els.student.querySelector('#studentLockBtn').onclick = toggleLock;
    els.student.querySelector('#btnFreeze').onclick = () => {

      student.frozen = !student.frozen;

    };
    els.student.querySelector('#btnExtend').onclick = () => {
      if(!requireUnlocked()) return;
      student.extendDays = Number(student.extendDays || 0) + 7;
      student.activeUntil = addDays(student.activeUntil, 7);
      render();
      showToast('Продление пакета: +7 дней');
    };
    els.student.querySelector('#btnPayStudent').onclick = () => {
      if(!requireUnlocked()) return;
      openPaymentSheet(student);
    };
    els.student.querySelector('#btnExcludeStudent').onclick = () => {
      if(!requireUnlocked()) return;
      confirmAction('Исключить ученика из текущего месяца?', () => excludeFromMonth(student.id));
    };
  }

  function bindProgress(){
    const student = currentStudent();
    if(!student) return;
    els.progress.querySelector('#progressLockBtn').onclick = toggleLock;
    els.progress.querySelectorAll('[data-slot-idx]').forEach(btn => {
      const idx = Number(btn.dataset.slotIdx);
      let timer = null;
      let longPressed = false;
      const start = (e) => {
        e.preventDefault();
        longPressed = false;
        timer = setTimeout(() => { longPressed = true; openSlotSheet(student, idx); }, 420);
      };
      const clear = () => clearTimeout(timer);
      const end = (e) => {
        e.preventDefault();
        clearTimeout(timer);
        if(longPressed) return;
        const slot = getSlot(student, idx);
        if(slot.kind && slot.kind !== 'empty'){
          openSlotSheet(student, idx);
          return;
        }
        if(!requireUnlocked()) return;
        quickAddBlock(student, idx);
      };
      btn.addEventListener('touchstart', start, {passive:false});
      btn.addEventListener('touchend', end, {passive:false});
      btn.addEventListener('touchmove', clear, {passive:false});
      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', end);
      btn.addEventListener('mouseleave', clear);
      btn.addEventListener('contextmenu', (e) => { e.preventDefault(); openSlotSheet(student, idx); });
    });
  }

  function quickAddBlock(student, idx){

    setSlot(student, idx, {kind:'block', paymentAmount:0, start:'18:30', arrival:''});
    render();
    showToast('Добавлена тренировка из пакета');

    const body = els.sheet.querySelector('#addModeBody');
    if(!body) return;
    if(mode === 'create'){
      body.innerHTML = `
        <div class="sheet-group">
          <label class="field"><span>ФИО</span><input id="new-name" placeholder="Фамилия Имя" /></label>

      body.querySelector('#save-new-student').onclick = () => {

        const name = body.querySelector('#new-name').value.trim();

        render();
        showToast('Новый ученик добавлен в группу');

  function packagePreset(value, paid){
    if(value === 'trial') return {packageType:'trial', packageLabel:'Пробная', packageTotal:1, packageNumber:1, startDate:`${app.year}-${String(app.month+1).padStart(2,'0')}-01`, activeUntil:`${app.year}-${String(app.month+1).padStart(2,'0')}-01`, price:0, paid:0, discount:0};
    const n = Number(value || 8);
    const price = n === 4 ? 2000 : n === 8 ? 3000 : 4000;
    return {packageType:'block', packageLabel:`Блок ${n}`, packageTotal:n, packageNumber:1, startDate:`${app.year}-${String(app.month+1).padStart(2,'0')}-01`, activeUntil:`${app.year}-${String(app.month+1).padStart(2,'0')}-29`, price, paid, discount:0};
  }

  function choiceHtml(person, type){
    const attr = type === 'pool' ? `data-add-pool="${person.id}"` : `data-add-group="${person.id}"`;
    return `
      <div class="choice">
        <div>
          <div class="name">${esc(person.fullName)}</div>
          <div class="meta">${esc(person.packageLabel)} • Пакет № ${person.packageNumber}</div>

  function openPaymentSheet(student, slotIdx = null){
    const slot = slotIdx === null ? null : getSlot(student, slotIdx);
    setSheet(`
      <div class="sheet-head">
        <div>
          <div class="sheet-title">Внести оплату</div>
          <div class="sheet-sub">${esc(student.fullName)} • долг ${student.debt}${slotIdx!==null ? ` • дата ${slotIdx+1}` : ''}</div>
        </div>
        <button class="close" data-close-sheet>×</button>
      </div>
      <div class="sheet-group">
        <button class="btn warn" id="pay-full-debt">Закрыть долг полностью</button>
        <label class="field"><span>Частичная сумма</span><input id="manual-pay" inputmode="numeric" placeholder="Введите сумму вручную" /></label>
        <button class="btn blue" id="pay-manual">Внести сумму</button>
      </div>
    `);
    els.sheet.querySelector('#pay-full-debt').onclick = () => applyPayment(student, student.debt, slotIdx);
    els.sheet.querySelector('#pay-manual').onclick = () => {
      const amount = Number(els.sheet.querySelector('#manual-pay').value || 0);
      applyPayment(student, amount, slotIdx);
    };
  }

  function applyPayment(student, amount, slotIdx = null){
    amount = Number(amount || 0);
    if(amount <= 0){ showToast('Сумма должна быть больше 0'); return; }
    student.paid = Number(student.paid || 0) + amount;
    refreshStudentDerived(student);
    if(slotIdx !== null){
      const slot = getSlot(student, slotIdx);
      slot.paymentAmount = Number(slot.paymentAmount || 0) + amount;
      setSlot(student, slotIdx, slot);
    }
    closeSheet();
    render();
    showToast(`Оплата внесена: ${amount}`);
  }

  function openSlotSheet(student, idx){
    const slot = getSlot(student, idx);
    setSheet(`
      <div class="sheet-head">
        <div>
          <div class="sheet-title">Факт тренировки</div>
          <div class="sheet-sub">${esc(student.fullName)} • слот ${idx+1} • изменение защищено замком</div>
        </div>
        <button class="close" data-close-sheet>×</button>
      </div>
      <div class="sheet-group">
        <div class="section-title" style="font-size:16px">Маркер дня</div>
        <div class="grid-2">
          <button class="btn small" data-slot-kind="block">Из пакета</button>
          <button class="btn small warn" data-slot-kind="trial">Пробная</button>
          <button class="btn small" data-slot-kind="single">Разовая</button>
          <button class="btn small" data-slot-kind="bonus">Бонусная</button>
        </div>
      </div>
      <div class="sheet-group">
        <label class="field"><span>Старт тренировки</span><input id="slot-start" value="${esc(slot.start || '18:30')}" placeholder="18:30" /></label>
        <label class="field"><span>Время прихода</span><input id="slot-arrival" value="${esc(slot.arrival || '')}" placeholder="например 18:24" /></label>
      </div>
      <div class="sheet-group">
        <button class="btn blue" id="slot-pay-btn">Внести оплату</button>
        <button class="btn danger" id="slot-clear-btn">Очистить слот</button>
      </div>
    `);
    els.sheet.querySelectorAll('[data-slot-kind]').forEach(btn => btn.onclick = () => {
      if(!requireUnlocked()) return;
      const next = getSlot(student, idx);
      next.kind = btn.dataset.slotKind;
      next.start = els.sheet.querySelector('#slot-start').value.trim() || '18:30';
      next.arrival = els.sheet.querySelector('#slot-arrival').value.trim();
      setSlot(student, idx, next);
      closeSheet();
      render();
      showToast('Факт тренировки сохранён');
    });
    els.sheet.querySelector('#slot-pay-btn').onclick = () => {
      if(!requireUnlocked()) return;
      const next = getSlot(student, idx);
      next.start = els.sheet.querySelector('#slot-start').value.trim() || '18:30';
      next.arrival = els.sheet.querySelector('#slot-arrival').value.trim();
      setSlot(student, idx, next.kind === 'empty' ? {kind:'block', paymentAmount:0, start:next.start, arrival:next.arrival} : next);
      openPaymentSheet(student, idx);
    };
    els.sheet.querySelector('#slot-clear-btn').onclick = () => {
      if(!requireUnlocked()) return;
      confirmAction('Очистить слот тренировки?', () => {
        setSlot(student, idx, null);
        closeSheet();
        render();
        showToast('Слот очищен');
      });
    };
  }

  function confirmAction(message, onConfirm){
    setSheet(`
      <div class="sheet-head">
        <div>
          <div class="sheet-title">Подтверждение</div>
          <div class="sheet-sub">${esc(message)}</div>
        </div>
        <button class="close" data-close-sheet>×</button>
      </div>
      <div class="sheet-group">
        <button class="btn danger" id="confirmYes">Да, выполнить</button>
        <button class="btn ghost" id="confirmNo">Отмена</button>
      </div>
    `);
    els.sheet.querySelector('#confirmYes').onclick = onConfirm;
    els.sheet.querySelector('#confirmNo').onclick = closeSheet;
  }

  function setSheet(html){
    els.sheet.innerHTML = html;
    els.sheetBackdrop.classList.add('show');
    els.sheet.querySelectorAll('[data-close-sheet]').forEach(btn => btn.onclick = closeSheet);
  }
  function closeSheet(){ els.sheetBackdrop.classList.remove('show'); els.sheet.innerHTML = ''; }
  els.sheetBackdrop.addEventListener('click', (e) => { if(e.target === els.sheetBackdrop) closeSheet(); });

  function showToast(text){
    els.toast.textContent = text;
    els.toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => els.toast.classList.remove('show'), 1800);
  }

  document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => {
    if((btn.dataset.view === 'student' || btn.dataset.view === 'progress') && !currentStudent()){
      showToast('Сначала выберите ученика');
      return;
    }
    app.view = btn.dataset.view;
    render();
  });
  els.globalLockBadge.onclick = toggleLock;

  monthState();
  render();
})();
</script>
</body>
</html>
