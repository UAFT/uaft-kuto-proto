<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UAFT • KUTO Mobile v2</title>
  <style>
    :root{
      --bg:#0b0c11;
      --panel:#141720;
      --panel-2:#171b26;
      --line:#262b38;
      --text:#edf0f7;
      --muted:#9da4b8;
      --blue:#427bff;
      --green:#34c56e;
      --yellow:#f0d271;
      --red:#ff6060;
      --orange:#f39c12;
      --chip:#1d2330;
      --shadow:0 10px 26px rgba(0,0,0,.34);
      --radius:20px;
      --radius-sm:14px;
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{overflow:hidden}
    .app{height:100dvh;display:flex;flex-direction:column;background:radial-gradient(circle at top center, rgba(66,123,255,.08), transparent 30%), var(--bg)}
    .topbar{position:sticky;top:0;z-index:20;padding:18px 18px 12px;border-bottom:1px solid var(--line);backdrop-filter:blur(12px);background:rgba(11,12,17,.92)}
    .title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    h1{margin:0;font-size:28px;line-height:1.05;letter-spacing:.2px}
    .sub{margin-top:6px;color:var(--muted);font-size:15px;line-height:1.35}
    .badge{align-self:flex-start;border:1px solid var(--line);background:rgba(255,255,255,.02);padding:11px 14px;border-radius:999px;color:var(--muted);font-weight:600;white-space:nowrap}

    .content{flex:1;overflow:auto;padding:16px 16px 110px}
    .view{display:none;gap:14px;flex-direction:column}
    .view.active{display:flex}

    .card{background:linear-gradient(180deg, rgba(255,255,255,.02), transparent 100%), var(--panel);border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow)}
    .card h2,.card h3{margin:0 0 6px}
    .card p{margin:0;color:var(--muted)}

    .stack{display:flex;flex-direction:column;gap:12px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

    .btn{appearance:none;border:1px solid var(--line);background:var(--chip);color:var(--text);border-radius:18px;padding:13px 14px;font-weight:700;font-size:16px;line-height:1.15;cursor:pointer;box-shadow:none}
    .btn.small{padding:11px 12px;font-size:15px;border-radius:16px}
    .btn.green{background:var(--green);color:#07110a;border-color:#24a758}
    .btn.blue{background:var(--blue);border-color:#2d63dc}
    .btn.ghost{background:transparent}
    .btn.warn{background:#302816;border-color:#5e4d1f;color:#f7dda0}
    .btn.danger{background:#331b1b;border-color:#6b2a2a;color:#ffb2b2}
    .btn:active{transform:translateY(1px)}
    .btn[disabled]{opacity:.45;cursor:default}

    .section-title{font-size:17px;font-weight:800;margin:0 0 4px}
    .section-sub{font-size:14px;color:var(--muted);margin:0 0 12px}

    label.field{display:flex;flex-direction:column;gap:8px;min-width:0}
    label.field span{color:var(--muted);font-size:14px}
    select,input{width:100%;background:var(--panel-2);color:var(--text);border:1px solid var(--line);border-radius:18px;padding:15px 16px;font-size:16px;outline:none}
    input::placeholder{color:#6f7890}
    .search-row{display:grid;grid-template-columns:1fr 132px;gap:12px}

    .student-list{display:flex;flex-direction:column;gap:12px}
    .student-card{padding:14px;background:var(--panel-2);border:1px solid var(--line);border-radius:22px;display:flex;flex-direction:column;gap:12px;cursor:pointer}
    .student-card.active-select{border-color:#3d6cff;box-shadow:0 0 0 2px rgba(61,108,255,.18) inset}
    .student-head{display:grid;grid-template-columns:auto 56px 1fr auto;gap:12px;align-items:start}
    .select-box{width:24px;height:24px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;background:#171b26;margin-top:6px;color:transparent;font-weight:900}
    .select-box.selected{background:var(--blue);border-color:#2d63dc;color:#fff}
    .avatar{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:18px;color:#f5f7fb;background:linear-gradient(135deg,#4f74ff,#1a1e2a);border:2px solid rgba(255,255,255,.08)}
    .student-main{min-width:0;display:flex;flex-direction:column;gap:8px}
    .fio{font-size:20px;line-height:1.1;font-weight:800;word-break:break-word}
    .meta-row{display:flex;flex-wrap:wrap;gap:8px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:10px 12px;border-radius:999px;border:1px solid var(--line);background:var(--chip);color:#dfe4f2;font-weight:700;font-size:15px}
    .chip.status-ok{background:rgba(52,197,110,.16);border-color:rgba(52,197,110,.34);color:#92f1b3}
    .chip.status-frozen{background:rgba(66,123,255,.16);border-color:rgba(66,123,255,.34);color:#b8cfff}
    .chip.status-debt{background:rgba(255,96,96,.16);border-color:rgba(255,96,96,.34);color:#ffc1c1}
    .power{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:14px;border:1px solid var(--line);background:#171b26;color:#9aa3b9;cursor:pointer}
    .power.on{color:#93efb4;background:rgba(52,197,110,.12);border-color:rgba(52,197,110,.28)}
    .power.off{color:#ff9d9d;background:rgba(255,96,96,.1);border-color:rgba(255,96,96,.28)}

    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .kpi{background:#121621;border:1px solid var(--line);border-radius:18px;padding:12px 12px 10px;min-width:0}
    .kpi .label{color:var(--muted);font-size:14px;margin-bottom:6px}
    .kpi .value{font-size:18px;font-weight:800;line-height:1.1}
    .card-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}

    .student-hero{display:flex;flex-direction:column;gap:14px}
    .hero-top{display:grid;grid-template-columns:68px 1fr;gap:14px;align-items:start}
    .hero-avatar{width:68px;height:68px;border-radius:50%;display:grid;place-items:center;font-size:24px;font-weight:900;background:linear-gradient(135deg,#4f74ff,#1a1e2a);border:2px solid rgba(255,255,255,.08)}
    .hero-title{display:flex;flex-direction:column;gap:8px;min-width:0}
    .hero-title h2{font-size:26px;line-height:1.05;margin:0;word-break:break-word}

    .progress-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
    .lock{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:var(--chip);font-weight:800;cursor:pointer;white-space:nowrap}
    .lock.unlocked{background:rgba(66,123,255,.18);border-color:rgba(66,123,255,.38);color:#cfe0ff}

    .month-strip{overflow:auto;margin:0 -4px;padding:4px 4px 2px}
    .days{display:flex;gap:12px;min-width:max-content}
    .day-card{width:128px;background:#121621;border:1px solid var(--line);border-radius:22px;padding:12px;display:flex;flex-direction:column;gap:12px}
    .day-head{text-align:center}
    .day-date{font-size:18px;font-weight:800;line-height:1.1}
    .day-dow{color:var(--muted);font-size:14px;margin-top:4px}
    .slot-stack{display:flex;flex-direction:column;gap:10px}
    .slot-block{display:grid;grid-template-columns:18px 1fr;gap:10px;align-items:center}
    .slot-label{color:#b0b8cd;font-size:15px;text-align:center}
    .slot{position:relative;background:#171b26;border:1px solid var(--line);border-radius:18px;min-height:70px;padding:10px 10px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:6px;text-align:center;cursor:pointer;user-select:none}
    .slot.empty{color:#7f8798}
    .slot.normal-1{background:rgba(66,123,255,.12);border-color:rgba(66,123,255,.26)}
    .slot.normal-2{background:rgba(52,197,110,.12);border-color:rgba(52,197,110,.26)}
    .slot.trial{background:rgba(240,210,113,.14);border-color:rgba(240,210,113,.32);color:#ffe9a6}
    .slot.single{background:rgba(243,156,18,.14);border-color:rgba(243,156,18,.32);color:#ffd6a0}
    .slot.bonus{background:rgba(172,126,255,.14);border-color:rgba(172,126,255,.32);color:#dec8ff}
    .slot .main{font-size:16px;font-weight:800;line-height:1}
    .slot .sub{font-size:13px;color:inherit;opacity:.86;margin:0}
    .pay-mark{position:absolute;right:8px;top:8px;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:rgba(240,210,113,.18);border:1px solid rgba(240,210,113,.38);display:flex;align-items:center;justify-content:center;color:#ffe7a8;font-size:12px;font-weight:800}

    .legend{display:flex;flex-wrap:wrap;gap:10px}
    .legend .chip{font-weight:600}
    .hint{color:var(--muted);font-size:14px;line-height:1.4}

    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:12px 16px calc(12px + var(--safe-bottom));background:linear-gradient(180deg, rgba(11,12,17,0), rgba(11,12,17,.96) 28%, rgba(11,12,17,.98));backdrop-filter:blur(12px)}
    .bottom-nav .row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0;margin:0;border:0}
    .nav-btn{padding:16px 10px;border-radius:20px;border:1px solid var(--line);background:rgba(20,23,32,.96);color:var(--text);font-size:16px;font-weight:800;cursor:pointer}
    .nav-btn.active{border-color:#396bfa;background:#1b2540;color:#dfe7ff}

    .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.48);backdrop-filter:blur(4px);display:none;z-index:50}
    .sheet-backdrop.show{display:block}
    .sheet{position:absolute;left:0;right:0;bottom:0;background:#11151f;border-top-left-radius:26px;border-top-right-radius:26px;border:1px solid var(--line);padding:16px 16px calc(16px + var(--safe-bottom));box-shadow:0 -18px 36px rgba(0,0,0,.44)}
    .sheet-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .sheet-title{font-size:20px;font-weight:900}
    .sheet-sub{color:var(--muted);font-size:14px}
    .close{background:transparent;border:0;color:#aeb6ca;font-size:28px;line-height:1;cursor:pointer}
    .sheet-group{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .sheet-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;z-index:60;background:#12161f;border:1px solid var(--line);color:var(--text);padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .18s ease, transform .18s ease}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

    @media (min-width:720px){
      .content{max-width:760px;margin:0 auto;padding-left:20px;padding-right:20px}
      .bottom-nav{display:flex;justify-content:center}
      .bottom-nav .row{max-width:760px;width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-row">
        <div>
          <h1>KUTO</h1>
          <div class="sub" id="headerSub">Кикбоксинг • Групповая • Группа A • Сентябрь 2025</div>
        </div>
        <div class="badge" id="selectedBadge">Выбрано: 0</div>
      </div>
    </header>

    <main class="content">
      <section class="view active" id="view-list"></section>
      <section class="view" id="view-student"></section>
      <section class="view" id="view-progress"></section>
    </main>

    <nav class="bottom-nav">
      <div class="row">
        <button class="nav-btn active" data-view="list">Состав</button>
        <button class="nav-btn" data-view="student">Ученик</button>
        <button class="nav-btn" data-view="progress">Прогресс</button>
      </div>
    </nav>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop">
    <div class="sheet" id="sheet"></div>
  </div>
  <div class="toast" id="toast"></div>

<script>
(() => {
  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const WEEK = ['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];
  const PRICE_BY_PACKAGE = {4: 2000, 8: 3000, 12: 4000};

  const app = {
    view: 'list',
    query: '',
    month: 8,
    year: 2025,
    discipline: 'Кикбоксинг',
    trainingType: 'Групповая',
    group: 'Группа A',
    selectedStudentId: 2,
    selectedForTransfer: new Set([2]),
    progressUnlocked: false,
    store: new Map(),
  };

  const listView = document.getElementById('view-list');
  const studentView = document.getElementById('view-student');
  const progressView = document.getElementById('view-progress');
  const headerSub = document.getElementById('headerSub');
  const selectedBadge = document.getElementById('selectedBadge');
  const sheetBackdrop = document.getElementById('sheetBackdrop');
  const sheet = document.getElementById('sheet');
  const toast = document.getElementById('toast');

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function monthKey(){ return `${app.year}-${String(app.month+1).padStart(2,'0')}`; }
  function fullContext(){ return `${app.discipline} • ${app.trainingType} • ${app.group} • ${MONTHS[app.month]} ${app.year}`; }
  function initials(name){
    return name.split(' ').filter(Boolean).slice(0,2).map(s => s[0]?.toUpperCase() || '').join('');
  }
  function priceFor(pkg){ return PRICE_BY_PACKAGE[pkg] || 0; }
  function selectedMonthState(){
    const key = monthKey();
    if(!app.store.has(key)) app.store.set(key, createSeedState());
    return app.store.get(key);
  }
  function clone(obj){ return JSON.parse(JSON.stringify(obj)); }

  function createStudent(data){
    const pkg = data.packageTotal || 8;
    const paid = data.paid ?? 0;
    const debt = Math.max(0, priceFor(pkg) - paid);
    return {
      id: data.id || uid(),
      fullName: data.fullName,
      packageTotal: pkg,
      packageLabel: `Блок ${pkg}`,
      paid,
      debt,
      active: data.active !== false,
      frozen: !!data.frozen,
      selected: false,
      extendDays: data.extendDays || 0,
      progressSlots: data.progressSlots || {},
    };
  }

  function createSeedState(){
    return {
      students: [
        createStudent({id:'u1', fullName:'Иванов Иван', packageTotal:12, paid:4000}),
        createStudent({id:'u2', fullName:'Петров Пётр', packageTotal:8, paid:2000}),
        createStudent({id:'u3', fullName:'Фролова Анна', packageTotal:4, paid:0}),
        createStudent({id:'u4', fullName:'Ксенофонтов Андрей', packageTotal:12, paid:0}),
      ]
    };
  }

  function ensureMonthState(){ selectedMonthState(); }
  ensureMonthState();

  function getStudents(){ return selectedMonthState().students; }
  function getActiveStudents(){ return getStudents().filter(s => s.active); }
  function getStudentById(id){ return getStudents().find(s => s.id === id) || null; }
  function getSelectedStudent(){
    let s = getStudentById(app.selectedStudentId);
    if(s && s.active) return s;
    const first = getActiveStudents()[0] || getStudents()[0] || null;
    app.selectedStudentId = first?.id || null;
    return first;
  }

  function computeUsed(student){
    return Object.values(student.progressSlots || {}).filter(slot => {
      if(!slot) return false;
      return ['normal-1','normal-2','trial','single','bonus'].includes(slot.kind);
    }).length;
  }
  function refreshStudentDerived(student){
    student.debt = Math.max(0, priceFor(student.packageTotal) - (student.paid || 0));
    student.packageLabel = `Блок ${student.packageTotal}`;
  }
  function studentStatus(student){
    refreshStudentDerived(student);
    if(student.frozen) return {text:'Заморожен', cls:'status-frozen'};
    if(student.debt > 0) return {text:'Долг', cls:'status-debt'};
    return {text:'Активен', cls:'status-ok'};
  }
  function progressText(student){ return `${computeUsed(student)}/${student.packageTotal}`; }

  function datesMWF(y,m,count=10){
    const d = new Date(y,m,1);
    while(d.getDay() !== 1){ d.setDate(d.getDate()+1); }
    const out = [];
    while(out.length < count){
      const wd = d.getDay();
      if([1,3,5].includes(wd)) out.push(new Date(d));
      d.setDate(d.getDate()+1);
    }
    return out;
  }

  function defaultSlot(){ return {kind:'empty', state:0, payment:0}; }
  function slotKey(index, part){ return `${index}:${part}`; }
  function getSlot(student, index, part){
    const key = slotKey(index, part);
    return student.progressSlots[key] ? clone(student.progressSlots[key]) : defaultSlot();
  }
  function setSlot(student, index, part, slot){
    const key = slotKey(index, part);
    if(!student.progressSlots) student.progressSlots = {};
    if(!slot || slot.kind === 'empty') delete student.progressSlots[key];
    else student.progressSlots[key] = slot;
  }

  function cycleNormal(student, index, part){
    const slot = getSlot(student, index, part);
    if(slot.kind !== 'normal-1' && slot.kind !== 'normal-2'){
      setSlot(student, index, part, {kind:'normal-1', state:1, payment:slot.payment || 0});
      return;
    }
    if(slot.kind === 'normal-1'){
      slot.kind = 'normal-2';
      slot.state = 2;
      setSlot(student, index, part, slot);
      return;
    }
    setSlot(student, index, part, null);
  }

  function slotView(slot){
    if(!slot || slot.kind === 'empty') return {cls:'empty', main:'пусто', sub:''};
    if(slot.kind === 'normal-1') return {cls:'normal-1', main:'1/2', sub:'обычная'};
    if(slot.kind === 'normal-2') return {cls:'normal-2', main:'2/2', sub:'обычная'};
    if(slot.kind === 'trial') return {cls:'trial', main:'П', sub:'пробная'};
    if(slot.kind === 'single') return {cls:'single', main:'Р', sub:'разовая'};
    if(slot.kind === 'bonus') return {cls:'bonus', main:'БОН', sub:'бонус'};
    return {cls:'empty', main:'пусто', sub:''};
  }

  function render(){
    headerSub.textContent = fullContext();
    selectedBadge.textContent = `Выбрано: ${app.selectedForTransfer.size}`;
    renderList();
    renderStudent();
    renderProgress();
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.view === app.view));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${app.view}`).classList.add('active');
  }

  function renderList(){
    const students = getActiveStudents().filter(s => !app.query || s.fullName.toLowerCase().includes(app.query.toLowerCase()));
    if(!students.some(s => s.id === app.selectedStudentId) && students[0]) app.selectedStudentId = students[0].id;

    listView.innerHTML = `
      <div class="card">
        <div class="section-title">Действия</div>
        <div class="section-sub">Массовые операции и быстрый ввод</div>
        <div class="grid-2">
          <button class="btn green small" id="btnAddStudent">+ Ученик</button>
          <button class="btn blue small" id="btnTransferSelected" ${app.selectedForTransfer.size ? '' : 'disabled'}>Перенести выбранных</button>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Контекст</div>
        <div class="section-sub">Фильтры, месяц и состав</div>
        <div class="grid-2">
          <label class="field"><span>Дисциплина</span><select id="f-discipline"><option ${app.discipline==='Кикбоксинг'?'selected':''}>Кикбоксинг</option><option ${app.discipline==='Бокс'?'selected':''}>Бокс</option></select></label>
          <label class="field"><span>Тип</span><select id="f-type"><option ${app.trainingType==='Групповая'?'selected':''}>Групповая</option><option ${app.trainingType==='Индивидуальная'?'selected':''}>Индивидуальная</option></select></label>
          <label class="field"><span>Группа</span><select id="f-group"><option ${app.group==='Группа A'?'selected':''}>Группа A</option><option ${app.group==='Группа B'?'selected':''}>Группа B</option></select></label>
          <label class="field"><span>Месяц</span><select id="f-month">${MONTHS.map((m,i)=>`<option value="${i}" ${app.month===i?'selected':''}>${m}</option>`).join('')}</select></label>
          <label class="field"><span>Год</span><select id="f-year">${[2024,2025,2026,2027].map(y=>`<option value="${y}" ${app.year===y?'selected':''}>${y}</option>`).join('')}</select></label>
        </div>
        <div style="height:12px"></div>
        <div class="search-row">
          <input id="f-search" placeholder="Фамилия Имя" value="${escapeHtml(app.query)}" />
          <button class="btn small" id="btnApplyFilters">Показать</button>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Список учеников</div>
        <div class="section-sub">Показываются только активные ученики выбранного месяца</div>
        <div class="student-list" id="studentList"></div>
      </div>
    `;

    const list = listView.querySelector('#studentList');
    if(!students.length){
      list.innerHTML = `<div class="hint">В этом месяце активных учеников нет.</div>`;
    } else {
      list.innerHTML = students.map(s => studentCardHtml(s)).join('');
    }

    bindListHandlers();
  }

  function studentCardHtml(student){
    const status = studentStatus(student);
    const isSelected = app.selectedStudentId === student.id;
    const isMarked = app.selectedForTransfer.has(student.id);
    return `
      <article class="student-card ${isSelected ? 'active-select' : ''}" data-student-card="${student.id}">
        <div class="student-head">
          <button class="select-box ${isMarked ? 'selected' : ''}" data-select-transfer="${student.id}">✓</button>
          <div class="avatar">${initials(student.fullName)}</div>
          <div class="student-main">
            <div class="fio">${escapeHtml(student.fullName)}</div>
            <div class="meta-row">
              <div class="chip">${escapeHtml(student.packageLabel)}</div>
              <div class="chip ${status.cls}">${status.text}</div>
            </div>
          </div>
          <button class="power ${student.active ? 'on' : 'off'}" data-toggle-active="${student.id}" title="${student.active ? 'Исключить из месяца' : 'Вернуть в месяц'}">${student.active ? '⏻' : '⭘'}</button>
        </div>
        <div class="kpis">
          <div class="kpi"><div class="label">Оплачено</div><div class="value">${student.paid}</div></div>
          <div class="kpi"><div class="label">Долг</div><div class="value">${student.debt}</div></div>
          <div class="kpi"><div class="label">Прогресс</div><div class="value">${progressText(student)}</div></div>
        </div>
        <div class="card-actions">
          <button class="btn small" data-open-student="${student.id}">Ученик</button>
          <button class="btn small" data-open-progress="${student.id}">Прогресс</button>
        </div>
      </article>
    `;
  }

  function renderStudent(){
    const student = getSelectedStudent();
    if(!student){
      studentView.innerHTML = `<div class="card"><div class="section-title">Ученик</div><div class="hint">Выберите ученика на экране состава.</div></div>`;
      return;
    }
    const status = studentStatus(student);
    studentView.innerHTML = `
      <div class="card student-hero">
        <div class="hero-top">
          <div class="hero-avatar">${initials(student.fullName)}</div>
          <div class="hero-title">
            <h2>${escapeHtml(student.fullName)}</h2>
            <div class="meta-row">
              <div class="chip">${escapeHtml(student.packageLabel)}</div>
              <div class="chip ${status.cls}">${status.text}</div>
              <div class="chip">Продление: +${student.extendDays || 0} дн</div>
            </div>
          </div>
        </div>
        <div class="kpis">
          <div class="kpi"><div class="label">Оплачено</div><div class="value">${student.paid}</div></div>
          <div class="kpi"><div class="label">Долг</div><div class="value">${student.debt}</div></div>
          <div class="kpi"><div class="label">Прогресс</div><div class="value">${progressText(student)}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Действия</div>
        <div class="section-sub">Заморозка, продление, оплата и состав месяца</div>
        <div class="grid-2">
          <button class="btn small ${student.frozen ? 'blue' : 'warn'}" id="btnFreeze">${student.frozen ? 'Разморозить' : 'Заморозить'}</button>
          <button class="btn small blue" id="btnExtend">Продлить +7 дней</button>
          <button class="btn small" id="btnPay">Внести оплату</button>
          <button class="btn small danger" id="btnRemoveMonth">Исключить из месяца</button>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Комментарий по канону окна</div>
        <div class="hint">На карточке показывается только текущий активный пакет. История пакетов сюда не выводится. Массовые действия на этом экране не дублируются.</div>
      </div>
    `;

    studentView.querySelector('#btnFreeze').onclick = () => {
      student.frozen = !student.frozen;
      render();
      showToast(student.frozen ? 'Пакет заморожен' : 'Заморозка снята');
    };
    studentView.querySelector('#btnExtend').onclick = () => {
      student.extendDays = (student.extendDays || 0) + 7;
      render();
      showToast('Продление: +7 дней');
    };
    studentView.querySelector('#btnPay').onclick = () => openPaymentSheet(student);
    studentView.querySelector('#btnRemoveMonth').onclick = () => {
      student.active = false;
      app.selectedForTransfer.delete(student.id);
      if(app.selectedStudentId === student.id) app.selectedStudentId = getActiveStudents()[0]?.id || null;
      render();
      app.view = 'list';
      render();
      showToast('Ученик исключён из текущего месяца');
    };
  }

  function renderProgress(){
    const student = getSelectedStudent();
    if(!student){
      progressView.innerHTML = `<div class="card"><div class="section-title">Прогресс</div><div class="hint">Выберите ученика на экране состава.</div></div>`;
      return;
    }
    const days = datesMWF(app.year, app.month, 10);
    progressView.innerHTML = `
      <div class="card">
        <div class="progress-top">
          <div>
            <div class="section-title">Прогресс месяца</div>
            <div class="section-sub">Одна матрица — только для выбранного ученика</div>
          </div>
          <button class="lock ${app.progressUnlocked ? 'unlocked' : ''}" id="lockBtn">${app.progressUnlocked ? '🔓 Изменения открыты' : '🔒 Изменения закрыты'}</button>
        </div>
        <div class="hero-title" style="margin-bottom:12px">
          <h2 style="font-size:22px">${escapeHtml(student.fullName)}</h2>
          <div class="meta-row">
            <div class="chip">${escapeHtml(student.packageLabel)}</div>
            <div class="chip">Оплачено ${student.paid}</div>
            <div class="chip">Долг ${student.debt}</div>
          </div>
        </div>
        <div class="month-strip">
          <div class="days" id="daysGrid">
            ${days.map((d,i) => dayCardHtml(student,d,i)).join('')}
          </div>
        </div>
      </div>
      <div class="card">
        <div class="section-title">Легенда и правила</div>
        <div class="legend">
          <div class="chip">1/2 и 2/2 — стадии обычной тренировки</div>
          <div class="chip">П — пробная</div>
          <div class="chip">Р — разовая</div>
          <div class="chip">БОН — бонусная</div>
          <div class="chip">₽ — к слоту привязана оплата</div>
        </div>
        <div style="height:12px"></div>
        <div class="hint">Быстрый тап по слоту работает только при открытом замке. Долгий тап открывает меню типа тренировки и оплаты. Это защита от случайного изменения прогресса.</div>
      </div>
    `;

    progressView.querySelector('#lockBtn').onclick = () => {
      app.progressUnlocked = !app.progressUnlocked;
      render();
      showToast(app.progressUnlocked ? 'Редактирование прогресса открыто' : 'Редактирование прогресса закрыто');
    };

    bindProgressHandlers(student);
  }

  function dayCardHtml(student, date, index){
    const morning = getSlot(student,index,'u');
    const evening = getSlot(student,index,'d');
    return `
      <article class="day-card">
        <div class="day-head">
          <div class="day-date">${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}</div>
          <div class="day-dow">${WEEK[date.getDay()]}</div>
        </div>
        <div class="slot-stack">
          ${slotBlockHtml(morning, 'У', index, 'u')}
          ${slotBlockHtml(evening, 'Д', index, 'd')}
        </div>
      </article>
    `;
  }

  function slotBlockHtml(slot, label, index, part){
    const v = slotView(slot);
    return `
      <div class="slot-block">
        <div class="slot-label">${label}</div>
        <button class="slot ${v.cls}" data-slot="${index}" data-part="${part}">
          ${slot.payment ? `<div class="pay-mark">₽</div>` : ''}
          <div class="main">${v.main}</div>
          ${v.sub ? `<div class="sub">${v.sub}</div>` : ''}
        </button>
      </div>
    `;
  }

  function bindListHandlers(){
    listView.querySelector('#btnAddStudent').onclick = openAddStudentSheet;
    listView.querySelector('#btnTransferSelected').onclick = transferSelectedToNextMonth;
    listView.querySelector('#btnApplyFilters').onclick = applyFilters;
    listView.querySelector('#f-search').addEventListener('keydown', (e) => { if(e.key === 'Enter') applyFilters(); });

    ['discipline','type','group','month','year'].forEach(key => {
      listView.querySelector(`#f-${key}`).onchange = applyFilters;
    });

    listView.querySelectorAll('[data-open-student]').forEach(btn => btn.onclick = (e) => {
      app.selectedStudentId = e.currentTarget.dataset.openStudent;
      app.view = 'student';
      render();
    });
    listView.querySelectorAll('[data-open-progress]').forEach(btn => btn.onclick = (e) => {
      app.selectedStudentId = e.currentTarget.dataset.openProgress;
      app.view = 'progress';
      render();
    });
    listView.querySelectorAll('[data-select-transfer]').forEach(btn => btn.onclick = (e) => {
      e.stopPropagation();
      const id = e.currentTarget.dataset.selectTransfer;
      if(app.selectedForTransfer.has(id)) app.selectedForTransfer.delete(id); else app.selectedForTransfer.add(id);
      render();
    });
    listView.querySelectorAll('[data-toggle-active]').forEach(btn => btn.onclick = (e) => {
      e.stopPropagation();
      const id = e.currentTarget.dataset.toggleActive;
      const student = getStudentById(id);
      if(!student) return;
      student.active = !student.active;
      if(!student.active) app.selectedForTransfer.delete(id);
      render();
      showToast(student.active ? 'Ученик возвращён в месяц' : 'Ученик исключён из текущего месяца');
    });
    listView.querySelectorAll('[data-student-card]').forEach(card => card.onclick = (e) => {
      if(e.target.closest('button')) return;
      app.selectedStudentId = e.currentTarget.dataset.studentCard;
      render();
    });
  }

  function bindProgressHandlers(student){
    progressView.querySelectorAll('[data-slot]').forEach(slotEl => {
      const index = Number(slotEl.dataset.slot);
      const part = slotEl.dataset.part;
      let pressTimer = null;
      let longPressed = false;

      const start = (ev) => {
        ev.preventDefault();
        longPressed = false;
        pressTimer = setTimeout(() => {
          longPressed = true;
          openSlotSheet(student, index, part);
        }, 420);
      };
      const cancel = () => {
        clearTimeout(pressTimer);
      };
      const end = (ev) => {
        ev.preventDefault();
        clearTimeout(pressTimer);
        if(longPressed) return;
        if(!app.progressUnlocked){
          showToast('Сначала откройте замок');
          return;
        }
        cycleNormal(student, index, part);
        render();
      };

      slotEl.addEventListener('touchstart', start, {passive:false});
      slotEl.addEventListener('touchend', end, {passive:false});
      slotEl.addEventListener('touchmove', cancel, {passive:false});
      slotEl.addEventListener('mousedown', start);
      slotEl.addEventListener('mouseup', end);
      slotEl.addEventListener('mouseleave', cancel);
      slotEl.addEventListener('contextmenu', (e) => { e.preventDefault(); openSlotSheet(student, index, part); });
    });
  }

  function applyFilters(){
    app.discipline = listView.querySelector('#f-discipline').value;
    app.trainingType = listView.querySelector('#f-type').value;
    app.group = listView.querySelector('#f-group').value;
    app.month = Number(listView.querySelector('#f-month').value);
    app.year = Number(listView.querySelector('#f-year').value);
    app.query = listView.querySelector('#f-search').value.trim();
    ensureMonthState();
    app.selectedForTransfer = new Set([...app.selectedForTransfer].filter(id => getStudentById(id)?.active));
    render();
  }

  function transferSelectedToNextMonth(){
    const ids = [...app.selectedForTransfer].filter(id => getStudentById(id)?.active);
    if(!ids.length){ showToast('Нет выбранных учеников'); return; }
    const currentKey = monthKey();
    const next = nextMonth(app.year, app.month);
    const targetKey = `${next.year}-${String(next.month+1).padStart(2,'0')}`;
    if(!app.store.has(targetKey)) app.store.set(targetKey, createSeedState());
    const source = app.store.get(currentKey).students;
    const target = app.store.get(targetKey).students;
    ids.forEach(id => {
      const src = source.find(s => s.id === id);
      if(!src) return;
      const exists = target.some(t => t.fullName === src.fullName && t.active);
      if(!exists){
        target.push(createStudent({
          fullName: src.fullName,
          packageTotal: src.packageTotal,
          paid: src.paid,
          active: true,
        }));
      }
    });
    showToast(`Перенесено: ${ids.length} → ${MONTHS[next.month]} ${next.year}`);
  }

  function nextMonth(year, month){
    if(month === 11) return {year: year+1, month:0};
    return {year, month: month+1};
  }

  function openAddStudentSheet(){
    setSheet(`
      <div class="sheet-head">
        <div>
          <div class="sheet-title">Добавить ученика</div>
          <div class="sheet-sub">Добавление только в текущий месяц: ${MONTHS[app.month]} ${app.year}</div>
        </div>
        <button class="close" data-close-sheet>×</button>
      </div>
      <div class="sheet-group">
        <label class="field"><span>ФИО</span><input id="add-name" placeholder="Фамилия Имя" /></label>
        <div class="sheet-grid">
          <label class="field"><span>Пакет</span><select id="add-package"><option value="4">Блок 4</option><option value="8" selected>Блок 8</option><option value="12">Блок 12</option></select></label>
          <label class="field"><span>Оплачено</span><input id="add-paid" inputmode="numeric" value="0" /></label>
        </div>
        <button class="btn green" id="add-save">Добавить в месяц</button>
      </div>
    `);
    sheet.querySelector('#add-save').onclick = () => {
      const fullName = sheet.querySelector('#add-name').value.trim();
      const pkg = Number(sheet.querySelector('#add-package').value);
      const paid = Number(sheet.querySelector('#add-paid').value || 0);
      if(!fullName){ showToast('Введите ФИО'); return; }
      getStudents().push(createStudent({fullName, packageTotal:pkg, paid, active:true}));
      closeSheet();
      render();
      showToast('Ученик добавлен только в текущий месяц');
    };
  }

  function openPaymentSheet(student, slotCtx = null){
    setSheet(`
      <div class="sheet-head">
        <div>
          <div class="sheet-title">Внести оплату</div>
          <div class="sheet-sub">${escapeHtml(student.fullName)} • долг ${student.debt}</div>
        </div>
        <button class="close" data-close-sheet>×</button>
      </div>
      <div class="sheet-group">
        <div class="sheet-grid-3">
          <button class="btn small" data-pay-amount="500">+500</button>
          <button class="btn small" data-pay-amount="1000">+1000</button>
          <button class="btn small" data-pay-amount="2000">+2000</button>
        </div>
        <button class="btn warn" id="pay-full">Закрыть долг полностью</button>
        <label class="field"><span>Своя сумма</span><input id="manual-pay" inputmode="numeric" placeholder="Например, 750" /></label>
        <button class="btn blue" id="manual-pay-btn">Внести сумму</button>
      </div>
    `);

    sheet.querySelectorAll('[data-pay-amount]').forEach(btn => btn.onclick = () => applyPayment(student, Number(btn.dataset.payAmount), slotCtx));
    sheet.querySelector('#pay-full').onclick = () => applyPayment(student, student.debt, slotCtx);
    sheet.querySelector('#manual-pay-btn').onclick = () => {
      const val = Number(sheet.querySelector('#manual-pay').value || 0);
      applyPayment(student, val, slotCtx);
    };
  }

  function applyPayment(student, amount, slotCtx = null){
    amount = Number(amount || 0);
    if(amount <= 0){ showToast('Сумма должна быть больше 0'); return; }
    student.paid += amount;
    refreshStudentDerived(student);
    if(slotCtx){
      const slot = getSlot(student, slotCtx.index, slotCtx.part);
      slot.payment = (slot.payment || 0) + amount;
      if(slot.kind === 'empty') slot.kind = 'normal-1';
      setSlot(student, slotCtx.index, slotCtx.part, slot);
    }
    closeSheet();
    render();
    showToast(`Оплата внесена: +${amount}`);
  }

  function openSlotSheet(student, index, part){
    const slot = getSlot(student,index,part);
    setSheet(`
      <div class="sheet-head">
        <div>
          <div class="sheet-title">Слот тренировки</div>
          <div class="sheet-sub">${escapeHtml(student.fullName)} • ${part.toUpperCase()} • ячейка ${index+1}</div>
        </div>
        <button class="close" data-close-sheet>×</button>
      </div>
      <div class="sheet-group">
        <div class="section-title" style="font-size:16px">Тип факта</div>
        <div class="sheet-grid">
          <button class="btn small" data-slot-kind="normal-1">Обычная 1/2</button>
          <button class="btn small" data-slot-kind="normal-2">Обычная 2/2</button>
          <button class="btn small warn" data-slot-kind="trial">Пробная</button>
          <button class="btn small" data-slot-kind="single">Разовая (+600)</button>
          <button class="btn small" data-slot-kind="bonus">Бонусная</button>
          <button class="btn small danger" data-slot-kind="clear">Очистить слот</button>
        </div>
      </div>
      <div class="sheet-group">
        <div class="section-title" style="font-size:16px">Оплата по слоту</div>
        <div class="sheet-grid-3">
          <button class="btn small" data-slot-pay="500">+500</button>
          <button class="btn small" data-slot-pay="1000">+1000</button>
          <button class="btn small" data-slot-pay="2000">+2000</button>
        </div>
        <button class="btn blue" id="slot-pay-manual">Внести свою сумму</button>
      </div>
    `);

    sheet.querySelectorAll('[data-slot-kind]').forEach(btn => btn.onclick = () => {
      const kind = btn.dataset.slotKind;
      if(kind === 'clear') setSlot(student,index,part,null);
      else {
        const current = getSlot(student,index,part);
        current.kind = kind;
        current.state = kind === 'normal-2' ? 2 : 1;
        if(kind === 'single' && !current.payment) current.payment = 600;
        setSlot(student,index,part,current);
      }
      closeSheet();
      render();
      showToast('Слот обновлён');
    });
    sheet.querySelectorAll('[data-slot-pay]').forEach(btn => btn.onclick = () => applyPayment(student, Number(btn.dataset.slotPay), {index, part}));
    sheet.querySelector('#slot-pay-manual').onclick = () => openPaymentSheet(student, {index, part});
  }

  function setSheet(html){
    sheet.innerHTML = html;
    sheetBackdrop.classList.add('show');
    sheet.querySelectorAll('[data-close-sheet]').forEach(btn => btn.onclick = closeSheet);
  }
  function closeSheet(){
    sheetBackdrop.classList.remove('show');
    sheet.innerHTML = '';
  }
  sheetBackdrop.addEventListener('click', (e) => { if(e.target === sheetBackdrop) closeSheet(); });

  function showToast(text){
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showToast.t);
    showToast.t = setTimeout(() => toast.classList.remove('show'), 1700);
  }

  document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => {
    if((btn.dataset.view === 'student' || btn.dataset.view === 'progress') && !getSelectedStudent()){
      showToast('Сначала выберите ученика');
      return;
    }
    app.view = btn.dataset.view;
    render();
  });

  function escapeHtml(s){
    return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  render();
})();
</script>
</body>
</html>
