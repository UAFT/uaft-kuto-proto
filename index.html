<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>UAFT • KUTO Mobile v4</title>
  <style>
    :root{
      --bg:#0b0c11;--panel:#141720;--panel2:#171b26;--line:#262b38;--text:#edf0f7;--muted:#9da4b8;
      --blue:#427bff;--green:#34c56e;--yellow:#f0d271;--red:#ff6060;--orange:#f39c12;--violet:#a980ff;
      --chip:#1d2330;--shadow:0 10px 26px rgba(0,0,0,.34);--safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{overflow:hidden}
    button,input,select{font:inherit}
    .app{height:100dvh;display:flex;flex-direction:column;background:radial-gradient(circle at top center, rgba(66,123,255,.08), transparent 30%), var(--bg)}
    .topbar{position:sticky;top:0;z-index:30;padding:14px 14px 10px;border-bottom:1px solid var(--line);backdrop-filter:blur(12px);background:rgba(11,12,17,.92)}
    .title-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    h1{margin:0;font-size:28px;line-height:1.04;letter-spacing:.2px}
    .sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.3}
    .head-right{display:flex;gap:8px;align-items:flex-start}
    .badge{border:1px solid var(--line);background:rgba(255,255,255,.02);padding:8px 11px;border-radius:999px;color:var(--muted);font-weight:800;white-space:nowrap;font-size:13px}
    .lock-btn{width:38px;height:38px;border-radius:14px;border:1px solid var(--line);background:#161b26;color:#dce5ff;display:grid;place-items:center;cursor:pointer;font-size:18px}
    .lock-btn.unlocked{background:rgba(66,123,255,.18);border-color:rgba(66,123,255,.38)}

    .content{flex:1;overflow:auto;padding:12px 12px 96px}
    .view{display:none;flex-direction:column;gap:10px}
    .view.active{display:flex}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.02), transparent 100%), var(--panel);border:1px solid var(--line);border-radius:22px;padding:12px;box-shadow:var(--shadow)}
    .toolbar{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .btn{appearance:none;border:1px solid var(--line);background:var(--chip);color:var(--text);border-radius:15px;padding:11px 12px;font-weight:800;line-height:1.1;cursor:pointer}
    .btn.small{padding:10px 11px;font-size:14px;border-radius:14px}
    .btn.blue{background:var(--blue);border-color:#2d63dc}
    .btn.green{background:var(--green);border-color:#24a758;color:#07110a}
    .btn.warn{background:#302816;border-color:#5e4d1f;color:#f7dda0}
    .btn.danger{background:#331b1b;border-color:#6b2a2a;color:#ffb2b2}
    .btn.ghost{background:transparent}
    .btn:active{transform:translateY(1px)}
    .section-title{font-size:17px;font-weight:900;margin:0}
    .context-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .field{display:flex;flex-direction:column;gap:6px;min-width:0}
    .field span{font-size:12px;color:var(--muted)}
    input,select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:15px;padding:12px 12px;outline:none}
    input::placeholder{color:#73809a}

    .list-wrap{display:flex;flex-direction:column;gap:8px}
    .row{display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:18px;padding:10px 11px;cursor:pointer}
    .row.selected{border-color:#3d6cff;box-shadow:0 0 0 2px rgba(61,108,255,.18) inset}
    .avatar{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#4f74ff,#1a1e2a);border:2px solid rgba(255,255,255,.08);font-size:16px;font-weight:900}
    .row-main{min-width:0}
    .fio{font-size:16px;font-weight:900;line-height:1.08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .row-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;border:1px solid var(--line);background:var(--chip);font-size:12px;font-weight:800}
    .chip.ok{background:rgba(52,197,110,.16);border-color:rgba(52,197,110,.34);color:#92f1b3}
    .chip.frozen{background:rgba(66,123,255,.16);border-color:rgba(66,123,255,.34);color:#b8cfff}
    .chip.debt{background:rgba(255,96,96,.16);border-color:rgba(255,96,96,.34);color:#ffc1c1}
    .row-side{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
    .status-btn{min-width:38px;height:34px;padding:0 10px;border-radius:12px;border:1px solid var(--line);background:#171b26;color:#dfe5f7;font-weight:900;cursor:pointer}
    .status-btn.ok{background:rgba(52,197,110,.15);border-color:rgba(52,197,110,.32);color:#a2f3be}
    .status-btn.off{background:rgba(255,96,96,.12);border-color:rgba(255,96,96,.3);color:#ffb7b7}
    .row-kpis{display:grid;grid-template-columns:repeat(2,auto);gap:6px;margin-top:7px;font-size:12px;color:var(--muted)}

    .hero{display:flex;flex-direction:column;gap:12px}
    .hero-top{display:grid;grid-template-columns:64px 1fr auto;gap:12px;align-items:start}
    .hero-avatar{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,#4f74ff,#1a1e2a);border:2px solid rgba(255,255,255,.08);font-size:22px;font-weight:900;cursor:pointer}
    .hero h2{margin:0;font-size:23px;line-height:1.04;word-break:break-word}
    .mini-note{font-size:12px;color:var(--muted);margin-top:5px}
    .facts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .fact{background:#121621;border:1px solid var(--line);border-radius:16px;padding:10px}
    .fact .label{font-size:12px;color:var(--muted);margin-bottom:5px}
    .fact .value{font-size:15px;font-weight:900;line-height:1.12}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}

    .progress-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}
    .month-strip{overflow:auto;margin:0 -2px;padding:2px}
    .days{display:flex;gap:10px;min-width:max-content}
    .day-card{width:128px;background:#121621;border:1px solid var(--line);border-radius:20px;padding:11px;display:flex;flex-direction:column;gap:10px}
    .day-date{font-size:18px;font-weight:900;text-align:center;line-height:1.04}
    .day-dow{font-size:12px;color:var(--muted);text-align:center;margin-top:4px}
    .slot{position:relative;min-height:88px;border-radius:18px;border:1px solid var(--line);background:#171b26;padding:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;text-align:center;cursor:pointer;user-select:none}
    .slot.empty{color:#7f8798}
    .slot.block{background:rgba(66,123,255,.12);border-color:rgba(66,123,255,.26)}
    .slot.trial{background:rgba(240,210,113,.14);border-color:rgba(240,210,113,.32);color:#ffe9a6}
    .slot.single{background:rgba(243,156,18,.14);border-color:rgba(243,156,18,.32);color:#ffd6a0}
    .slot.bonus{background:rgba(169,128,255,.14);border-color:rgba(169,128,255,.32);color:#dec8ff}
    .mainMark{font-size:20px;font-weight:900;line-height:1}
    .slotSub{font-size:11px;opacity:.9;line-height:1.15}
    .payMark{position:absolute;right:8px;top:8px;min-width:22px;height:22px;padding:0 7px;border-radius:999px;background:rgba(52,197,110,.16);border:1px solid rgba(52,197,110,.36);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#a8f4c1}
    .time-meta{display:grid;grid-template-columns:1fr;gap:4px}
    .time-meta div{font-size:11px;color:var(--muted);text-align:center;line-height:1.2}

    .package-list{display:flex;flex-direction:column;gap:8px}
    .package-card{background:#121621;border:1px solid var(--line);border-radius:18px;padding:12px;display:flex;flex-direction:column;gap:8px}
    .package-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .pkg-title{font-size:16px;font-weight:900;line-height:1.08}
    .pkg-meta{display:flex;flex-wrap:wrap;gap:6px}

    .bottom-nav{position:fixed;left:0;right:0;bottom:0;z-index:30;padding:10px 12px calc(10px + var(--safe-bottom));background:linear-gradient(180deg, rgba(11,12,17,0), rgba(11,12,17,.96) 30%, rgba(11,12,17,.98));backdrop-filter:blur(12px)}
    .bottom-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
    .nav-btn{padding:12px 8px;border-radius:15px;border:1px solid var(--line);background:rgba(20,23,32,.96);color:var(--text);font-size:13px;font-weight:900;cursor:pointer}
    .nav-btn.active{border-color:#396bfa;background:#1b2540;color:#dfe7ff}

    .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.52);backdrop-filter:blur(4px);display:none;z-index:60}
    .sheet-backdrop.show{display:block}
    .sheet{position:absolute;left:0;right:0;bottom:0;background:#11151f;border-top-left-radius:24px;border-top-right-radius:24px;border:1px solid var(--line);padding:14px 14px calc(14px + var(--safe-bottom));box-shadow:0 -18px 36px rgba(0,0,0,.44);max-height:min(84dvh,760px);overflow:auto}
    .sheet-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
    .sheet-title{font-size:20px;font-weight:900;line-height:1.06}
    .sheet-sub{color:var(--muted);font-size:13px;line-height:1.35;margin-top:4px}
    .close{background:transparent;border:0;color:#aeb6ca;font-size:28px;line-height:1;cursor:pointer}
    .sheet-group{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .segment{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .segment button.active{border-color:#396bfa;background:#1b2540;color:#dfe7ff}
    .choice{background:#121621;border:1px solid var(--line);border-radius:16px;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .choice .name{font-weight:800;line-height:1.12}
    .choice .meta{font-size:12px;color:var(--muted)}

    .toast{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:70;background:#12161f;border:1px solid var(--line);color:var(--text);padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .18s ease, transform .18s ease;max-width:calc(100vw - 32px);text-align:center}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

    @media (min-width:720px){
      .content{max-width:780px;margin:0 auto;padding-left:16px;padding-right:16px}
      .bottom-nav{display:flex;justify-content:center}
      .bottom-row{max-width:780px;width:100%}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-row">
        <div>
          <h1>KUTO</h1>
          <div class="sub" id="headerSub"></div>
        </div>
        <div class="head-right">
          <div class="badge" id="groupStatsBadge"></div>
          <button class="lock-btn" id="globalLockBtn" aria-label="Lock"></button>
        </div>
      </div>
    </header>

    <main class="content">
      <section class="view active" id="view-list"></section>
      <section class="view" id="view-student"></section>
      <section class="view" id="view-progress"></section>
      <section class="view" id="view-packages"></section>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-row">
        <button class="nav-btn active" data-view="list">Состав</button>
        <button class="nav-btn" data-view="student">Ученик</button>
        <button class="nav-btn" data-view="progress">Прогресс</button>
        <button class="nav-btn" data-view="packages">Пакеты</button>
      </div>
    </nav>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>

<script>
(() => {
  const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const WEEK = ['ВС','ПН','ВТ','СР','ЧТ','ПТ','СБ'];

  const app = {
    view: 'list',
    discipline: 'Кикбоксинг',
    trainingType: 'Групповая',
    group: 'Группа A',
    month: 8,
    year: 2025,
    query: '',
    editUnlocked: false,
    selectedStudentId: 'u2',
    groupLimit: 20,
    groupTotal: 15,
    store: new Map(),
    studentPool: [
      {id:'sp1', fullName:'Смирнов Егор', packageLabel:'Блок 8', packageType:'block', packageTotal:8, packageNumber:7, startDate:'2025-07-05', activeUntil:'2025-08-02', price:3000, paid:3000, discount:0},
      {id:'sp2', fullName:'Зайцева Полина', packageLabel:'Блок 4', packageType:'block', packageTotal:4, packageNumber:3, startDate:'2025-08-09', activeUntil:'2025-09-06', price:2000, paid:1500, discount:0},
      {id:'sp3', fullName:'Кузнецов Максим', packageLabel:'Пробная', packageType:'trial', packageTotal:1, packageNumber:1, startDate:'2025-09-05', activeUntil:'2025-09-05', price:0, paid:0, discount:0}
    ],
    groupPool: [
      {id:'gp1', fullName:'Лазарев Никита', packageLabel:'Блок 12', packageType:'block', packageTotal:12, packageNumber:4, startDate:'2025-06-01', activeUntil:'2025-06-29', price:4000, paid:4000, discount:0},
      {id:'gp2', fullName:'Тарасова Вера', packageLabel:'Блок 8', packageType:'block', packageTotal:8, packageNumber:5, startDate:'2025-07-14', activeUntil:'2025-08-11', price:3000, paid:3000, discount:0}
    ]
  };

  const els = {
    headerSub: document.getElementById('headerSub'),
    groupStatsBadge: document.getElementById('groupStatsBadge'),
    globalLockBtn: document.getElementById('globalLockBtn'),
    list: document.getElementById('view-list'),
    student: document.getElementById('view-student'),
    progress: document.getElementById('view-progress'),
    packages: document.getElementById('view-packages'),
    sheetBackdrop: document.getElementById('sheetBackdrop'),
    sheet: document.getElementById('sheet'),
    toast: document.getElementById('toast')
  };

  function uid(){ return Math.random().toString(36).slice(2,10); }
  function monthKey(){ return `${app.year}-${String(app.month+1).padStart(2,'0')}`; }
  function fullContext(){ return `${app.discipline} • ${app.trainingType} • ${app.group} • ${MONTHS[app.month]} ${app.year}`; }
  function initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(s => (s[0] || '').toUpperCase()).join(''); }
  function clone(v){ return JSON.parse(JSON.stringify(v)); }
  function esc(s){ return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function formatDate(iso){ if(!iso) return '—'; const [y,m,d] = String(iso).split('-'); return y&&m&&d ? `${d}.${m}.${y}` : iso; }
  function addDays(iso, days){ const dt=new Date(iso+'T00:00:00'); dt.setDate(dt.getDate()+days); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
  function money(v){ return String(v || 0); }
  function requireUnlocked(msg='Откройте замок'){ if(app.editUnlocked) return true; showToast(msg); return false; }

  function makeHistory(base){
    return base || [];
  }

  function createStudent(data){
    const s = {
      id: data.id || uid(),
      fullName: data.fullName || 'Новый ученик',
      packageType: data.packageType || 'block',
      packageLabel: data.packageLabel || 'Блок 8',
      packageNumber: Number(data.packageNumber || 1),
      packageTotal: Number(data.packageTotal || 8),
      startDate: data.startDate || `${app.year}-${String(app.month+1).padStart(2,'0')}-01`,
      activeUntil: data.activeUntil || `${app.year}-${String(app.month+1).padStart(2,'0')}-29`,
      price: Number(data.price || 0),
      paid: Number(data.paid || 0),
      discount: Number(data.discount || 0),
      active: data.active !== false,
      frozen: !!data.frozen,
      extendDays: Number(data.extendDays || 0),
      progressSlots: data.progressSlots || {},
      seriesTrainings: Number(data.seriesTrainings || 0),
      avatarMode: data.avatarMode || 'initials',
      packageHistory: makeHistory(data.packageHistory),
      monthlyMembership: data.monthlyMembership || monthKey()
    };
    if(!s.packageHistory.length){
      s.packageHistory.push({
        id:'pkg_'+uid(), number:s.packageNumber, label:s.packageLabel, type:s.packageType, total:s.packageTotal,
        discipline: app.discipline, startDate:s.startDate, activeUntil:s.activeUntil, price:s.price,
        paid:s.paid, discount:s.discount, progress:'0/'+(s.packageTotal||1), current:true
      });
    }
    refreshStudentDerived(s);
    return s;
  }

  function createSeedState(){
    return { students: [
      createStudent({id:'u1', fullName:'Иванов Иван', packageLabel:'Блок 8', packageType:'block', packageTotal:8, packageNumber:4, startDate:'2025-09-02', activeUntil:'2025-09-30', price:3000, paid:3000, progressSlots:{'1':{kind:'block', paymentAmount:0, start:'18:30'},'4':{kind:'block', paymentAmount:0, start:'18:30'}}, seriesTrainings:12,
        packageHistory:[
          {id:'p11', number:1, label:'Блок 12', type:'block', total:12, discipline:'Кикбоксинг', startDate:'2025-05-01', activeUntil:'2025-05-29', price:4000, paid:4000, discount:0, progress:'12/12', current:false},
          {id:'p12', number:2, label:'Блок 12', type:'block', total:12, discipline:'Кикбоксинг', startDate:'2025-06-03', activeUntil:'2025-07-01', price:4000, paid:4000, discount:0, progress:'12/12', current:false},
          {id:'p13', number:3, label:'Блок 8', type:'block', total:8, discipline:'Кикбоксинг', startDate:'2025-08-01', activeUntil:'2025-08-29', price:3000, paid:3000, discount:0, progress:'8/8', current:false},
          {id:'p14', number:4, label:'Блок 8', type:'block', total:8, discipline:'Кикбоксинг', startDate:'2025-09-02', activeUntil:'2025-09-30', price:3000, paid:3000, discount:0, progress:'2/8', current:true}
        ]}),
      createStudent({id:'u2', fullName:'Фролова Анна', packageLabel:'Блок 12', packageType:'block', packageTotal:12, packageNumber:9, startDate:'2025-09-01', activeUntil:'2025-09-29', price:4000, paid:2500, discount:0, progressSlots:{'0':{kind:'block', start:'18:30'},'2':{kind:'block', start:'18:30'},'6':{kind:'single', paymentAmount:600, start:'18:30'},'8':{kind:'bonus', start:'18:30'}}, seriesTrainings:19,
        packageHistory:[
          {id:'p21', number:7, label:'Блок 12', type:'block', total:12, discipline:'Кикбоксинг', startDate:'2025-07-01', activeUntil:'2025-07-29', price:4000, paid:4000, discount:0, progress:'12/12', current:false},
          {id:'p22', number:8, label:'Блок 12', type:'block', total:12, discipline:'Кикбоксинг', startDate:'2025-08-01', activeUntil:'2025-08-29', price:4000, paid:4000, discount:0, progress:'12/12', current:false},
          {id:'p23', number:9, label:'Блок 12', type:'block', total:12, discipline:'Кикбоксинг', startDate:'2025-09-01', activeUntil:'2025-09-29', price:4000, paid:2500, discount:0, progress:'2/12', current:true}
        ]}),
      createStudent({id:'u3', fullName:'Петров Пётр', packageLabel:'Пробная', packageType:'trial', packageTotal:1, packageNumber:1, startDate:'2025-09-03', activeUntil:'2025-09-03', price:0, paid:0, progressSlots:{'2':{kind:'trial', start:'18:30'}}, seriesTrainings:1,
        packageHistory:[{id:'p31', number:1, label:'Пробная', type:'trial', total:1, discipline:'Кикбоксинг', startDate:'2025-09-03', activeUntil:'2025-09-03', price:0, paid:0, discount:0, progress:'P', current:true}] }),
      createStudent({id:'u4', fullName:'Ксенофонтов Андрей', packageLabel:'Блок 4', packageType:'block', packageTotal:4, packageNumber:12, startDate:'2025-09-04', activeUntil:'2025-10-02', price:2000, paid:1000, frozen:true, progressSlots:{'0':{kind:'block', start:'18:30'},'3':{kind:'block', start:'18:30'}}, seriesTrainings:8,
        packageHistory:[{id:'p41', number:12, label:'Блок 4', type:'block', total:4, discipline:'Кикбоксинг', startDate:'2025-09-04', activeUntil:'2025-10-02', price:2000, paid:1000, discount:0, progress:'2/4', current:true}] })
    ]};
  }

  function monthState(){ const key = monthKey(); if(!app.store.has(key)) app.store.set(key, createSeedState()); return app.store.get(key); }
  function students(){ return monthState().students; }
  function activeStudents(){ return students().filter(s => s.active); }
  function getStudent(id){ return students().find(s => s.id === id) || null; }
  function ensureSelected(){ const cur=getStudent(app.selectedStudentId); if(cur) return cur; const first=activeStudents()[0]||students()[0]||null; app.selectedStudentId=first?first.id:null; return first; }
  function currentStudent(){ return ensureSelected(); }

  function kindCount(student, kind){ return Object.values(student.progressSlots||{}).filter(v => v && v.kind===kind).length; }
  function blockCount(student){ return kindCount(student,'block'); }
  function progressText(student){
    if(student.packageType==='trial') return kindCount(student,'trial') ? 'P' : '0';
    if(student.packageType==='single') return `${kindCount(student,'single')}`;
    if(student.packageType==='bonus') return `БОН ${kindCount(student,'bonus')}`;
    return `${blockCount(student)}/${student.packageTotal}`;
  }
  function currentPackage(student){ return (student.packageHistory||[]).find(p=>p.current) || null; }
  function computeStreak(student){
    const arr = Object.keys(student.progressSlots||{}).map(Number).sort((a,b)=>a-b);
    let streak=0, best=0, prev=null;
    for(const n of arr){ if(prev===null || n===prev+1) streak += 1; else streak = 1; if(streak>best) best=streak; prev=n; }
    return {streak, best};
  }
  function refreshStudentDerived(student){
    student.debt = Math.max(0, Number(student.price||0)-Number(student.discount||0)-Number(student.paid||0));
    const st = computeStreak(student);
    student.streak = st.streak;
    if(!student.seriesTrainings) student.seriesTrainings = Object.keys(student.progressSlots||{}).length;
    const cp = currentPackage(student);
    if(cp){
      cp.paid = student.paid; cp.discount = student.discount; cp.price = student.price; cp.startDate = student.startDate; cp.activeUntil = student.activeUntil;
      cp.progress = progressText(student);
    }
  }
  function statusChip(student){
    refreshStudentDerived(student);
    if(!student.active) return {text:'Выкл', cls:'off'};
    if(student.frozen) return {text:'Заморожен', cls:'frozen'};
    if(student.debt>0) return {text:'Долг', cls:'debt'};
    return {text:'Активен', cls:'ok'};
  }

  function datesMWF(y,m,count=10){ const d=new Date(y,m,1); while(d.getDay()!==1){ d.setDate(d.getDate()+1); } const out=[]; while(out.length<count){ if([1,3,5].includes(d.getDay())) out.push(new Date(d)); d.setDate(d.getDate()+1); } return out; }
  function getSlot(student, idx){ return student.progressSlots[idx] ? clone(student.progressSlots[idx]) : {kind:'empty', paymentAmount:0, arrival:'', start:'18:30'}; }
  function setSlot(student, idx, slot){ if(!student.progressSlots) student.progressSlots={}; if(!slot || slot.kind==='empty') delete student.progressSlots[idx]; else student.progressSlots[idx]=slot; refreshStudentDerived(student); }
  function ordinalForKind(student, idx, kind){ return Object.keys(student.progressSlots||{}).map(Number).sort((a,b)=>a-b).filter(i => i<=idx && student.progressSlots[i] && student.progressSlots[i].kind===kind).length; }
  function slotVisual(student, idx){
    const slot = getSlot(student, idx);
    if(!slot || slot.kind==='empty') return {cls:'empty', main:'+', sub:'', pay:''};
    if(slot.kind==='block') return {cls:'block', main:`${ordinalForKind(student, idx, 'block')}/${student.packageTotal}`, sub:'', pay:slot.paymentAmount ? '₽' : ''};
    if(slot.kind==='trial') return {cls:'trial', main:'P', sub:'', pay:slot.paymentAmount ? '₽' : ''};
    if(slot.kind==='single') return {cls:'single', main:`${ordinalForKind(student, idx, 'single')}`, sub:'', pay:slot.paymentAmount ? '₽' : ''};
    if(slot.kind==='bonus') return {cls:'bonus', main:`БОН ${ordinalForKind(student, idx, 'bonus')}`, sub:'', pay:slot.paymentAmount ? '₽' : ''};
    return {cls:'empty', main:'+', sub:'', pay:''};
  }

      btn.addEventListener('touchstart', start, {passive:false});
      btn.addEventListener('touchend', end, {passive:false});
      btn.addEventListener('touchmove', clear, {passive:false});
      btn.addEventListener('mousedown', start); btn.addEventListener('mouseup', end); btn.addEventListener('mouseleave', clear);

      </div>
      <div class="sheet-group">
        <button class="btn warn" id="pay-full-debt">Закрыть долг полностью</button>
        <label class="field"><span>Сумма</span><input id="manual-pay" inputmode="numeric" placeholder="Введите сумму" /></label>
        <button class="btn blue" id="pay-manual">Сохранить</button>
      </div>`);
    els.sheet.querySelector('#pay-full-debt').onclick = () => applyPayment(student, student.debt, slotIdx);
    els.sheet.querySelector('#pay-manual').onclick = () => applyPayment(student, Number(els.sheet.querySelector('#manual-pay').value||0), slotIdx);
  }

  function applyPayment(student, amount, slotIdx = null){
    amount = Number(amount||0); if(amount<=0){ showToast('Сумма должна быть больше 0'); return; }
    student.paid = Number(student.paid||0) + amount; refreshStudentDerived(student);
    if(slotIdx!==null){ const slot=getSlot(student, slotIdx); slot.paymentAmount = Number(slot.paymentAmount||0)+amount; setSlot(student, slotIdx, slot); }
    closeSheet(); render(); showToast(`Оплата: ${amount}`);
  }

  function openSlotSheet(student, idx){
    const slot=getSlot(student, idx);
    setSheet(`
      <div class="sheet-head">
        <div><div class="sheet-title">Тренировка</div><div class="sheet-sub">${esc(student.fullName)} • ${idx+1}</div></div>
        <button class="close" data-close-sheet>×</button>
      </div>
      <div class="sheet-group">
        <div class="context-grid">
          <button class="btn small" data-slot-kind="block">Из пакета</button>
          <button class="btn small warn" data-slot-kind="trial">Пробная</button>
          <button class="btn small" data-slot-kind="single">Разовая</button>
          <button class="btn small" data-slot-kind="bonus">Бонус</button>
        </div>
      </div>
      <div class="sheet-group">
        <label class="field"><span>Старт</span><input id="slot-start" value="${esc(slot.start || '18:30')}" placeholder="18:30" /></label>
        <label class="field"><span>Приход</span><input id="slot-arrival" value="${esc(slot.arrival || '')}" placeholder="18:24" /></label>
      </div>
      <div class="sheet-group">
        <button class="btn blue" id="slot-pay-btn">${student.debt>0 && student.paid>0 ? 'Внести доплату' : 'Внести оплату'}</button>
        <button class="btn danger" id="slot-clear-btn">Очистить слот</button>
      </div>`);
    els.sheet.querySelectorAll('[data-slot-kind]').forEach(btn => btn.onclick = () => {
      if(!requireUnlocked()) return;
      const next = getSlot(student, idx); next.kind = btn.dataset.slotKind; next.start = els.sheet.querySelector('#slot-start').value.trim() || '18:30'; next.arrival = els.sheet.querySelector('#slot-arrival').value.trim();
      setSlot(student, idx, next); closeSheet(); render(); showToast('Тренировка сохранена');
    });
    els.sheet.querySelector('#slot-pay-btn').onclick = () => {
      if(!requireUnlocked()) return;
      const next = getSlot(student, idx); next.start = els.sheet.querySelector('#slot-start').value.trim() || '18:30'; next.arrival = els.sheet.querySelector('#slot-arrival').value.trim();
      if(next.kind==='empty') next.kind = student.packageType==='block' ? 'block' : 'single';
      setSlot(student, idx, next); openPaymentSheet(student, idx);
    };
    els.sheet.querySelector('#slot-clear-btn').onclick = () => {
      if(!requireUnlocked()) return;
      confirmAction('Очистить слот?', () => { setSlot(student, idx, null); closeSheet(); render(); showToast('Слот очищен'); });
    };
  }

  function confirmAction(message, onConfirm){
    setSheet(`
      <div class="sheet-head"><div><div class="sheet-title">Подтверждение</div><div class="sheet-sub">${esc(message)}</div></div><button class="close" data-close-sheet>×</button></div>
      <div class="sheet-group"><button class="btn danger" id="confirmYes">Да</button><button class="btn ghost" id="confirmNo">Отмена</button></div>`);
    els.sheet.querySelector('#confirmYes').onclick = onConfirm; els.sheet.querySelector('#confirmNo').onclick = closeSheet;
  }

  function setSheet(html){ els.sheet.innerHTML = html; els.sheetBackdrop.classList.add('show'); els.sheet.querySelectorAll('[data-close-sheet]').forEach(btn => btn.onclick = closeSheet); }
  function closeSheet(){ els.sheetBackdrop.classList.remove('show'); els.sheet.innerHTML = ''; }
  els.sheetBackdrop.addEventListener('click', (e) => { if(e.target === els.sheetBackdrop) closeSheet(); });

  function showToast(text){ els.toast.textContent = text; els.toast.classList.add('show'); clearTimeout(showToast._t); showToast._t = setTimeout(() => els.toast.classList.remove('show'), 1800); }

  document.querySelectorAll('.nav-btn').forEach(btn => btn.onclick = () => {
    const target = btn.dataset.view;
    if((target==='student'||target==='progress'||target==='packages') && !currentStudent()){ showToast('Сначала выберите ученика'); return; }
    app.view = target; render();
  });
  els.globalLockBtn.onclick = toggleLock;

  monthState(); render();
})();
</script>
</body>
</html>
