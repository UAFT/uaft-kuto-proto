<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>UAFT • KUTO Mobile Final</title>
  <link rel="stylesheet" href="./styles/main.css" />
  <link rel="stylesheet" href="./styles/kuto.css" />
  <link rel="stylesheet" href="./styles/student-profile.css" />
</head>
<body>
  <div class="app">
  <header class="topbar">
    <div class="title-row">
      <div>
        <h1>KUTO</h1>
        <div class="sub" id="headerSub"></div>
      </div>
      <div class="head-right">
        <div class="head-right-top">
          <div class="badge" id="groupStatsBadge"></div>
          <button aria-label="Lock" class="lock-btn" id="globalLockBtn"></button>
        </div>
        <div class="head-right-journal" id="headerJournalSlot"></div>
      </div>
    </div>
    <div class="header-actions" id="headerActions"></div>
  </header>

  <main class="content" id="content">
    <section class="view active" id="view-list"></section>
    <section class="view" id="view-student"></section>
    <section class="view" id="view-progress"></section>
    <section class="view" id="view-packages"></section>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-row">
      <button class="nav-btn active" data-view="list">Состав</button>
      <button class="nav-btn" data-view="student">Ученик</button>
      <button class="nav-btn" data-view="progress">Прогресс</button>
      <button class="nav-btn" data-view="packages">Пакеты</button>
    </div>
  </nav>
</div>

<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet" id="sheet"></div>
</div>
<div class="toast" id="toast"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
